services:
  - type: web
    name: nyamatrack-backend
    runtime: python
    plan: free
    pythonVersion: "3.11.0"  # Alternative syntax
    buildCommand: "./build.sh"
    startCommand: "gunicorn nyamatrack.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: nyamatrack-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "nyamatrack-backend.onrender.com,*.onrender.com"

databases:
  - name: nyamatrack-db
    databaseName: nyamatrack
    user: nyamatrack
    plan: free
    ipAllowList: []